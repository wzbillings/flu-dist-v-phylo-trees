name: PR test suite

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLU_TARGETS_MODE: test
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test:
    name: Run R test suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
          use-public-rspm: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            libcurl4-openssl-dev \
            libcairo2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libfribidi-dev \
            libglpk-dev \
            libharfbuzz-dev \
            libicu-dev \
            libjpeg-dev \
            libmagick++-dev \
            libpng-dev \
            libssl-dev \
            libtiff-dev \
            libuv1-dev \
            libwebp-dev \
            libxml2-dev \
            pkg-config \
            zlib1g-dev

      - name: Restore renv package library
        uses: r-lib/actions/setup-renv@v2

      - name: Run test suite
        run: Rscript tests/run-tests.R
